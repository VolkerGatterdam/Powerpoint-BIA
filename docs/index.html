<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MACS Matchmaker Data Viewer</title>

    <!-- Office.js Bibliothek -->
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>

    <!-- MSAL.js fuer Nested App Authentication (NAA) + Graph API
         Wird erst aktiviert wenn die Entra ID App Registration konfiguriert ist.
         CDN: https://cdn.jsdelivr.net/npm/@azure/msal-browser@3.26.0/lib/msal-browser.min.js -->

    <!-- Fluent UI fuer konsistentes Microsoft-Design -->
    <link rel="stylesheet" href="https://static2.sharepointonline.com/files/fabric/office-ui-fabric-core/11.0.0/css/fabric.min.css"/>

    <style>
    /* Reset und Vollbild-Basis */
    * {
        box-sizing: border-box;
    }

    html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: #ffffff;
    }

    /* ===== Setup-Ansicht: Zentrierte Karte ===== */

    .view-setup {
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: #faf9f8;
    }

    .setup-card {
        background: #ffffff;
        border-radius: 8px;
        padding: 32px;
        max-width: 500px;
        width: 90%;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .setup-card h2 {
        margin: 0 0 20px 0;
        color: #323130;
        font-weight: 600;
    }

    .setup-card label {
        display: block;
        margin-bottom: 6px;
        color: #605e5c;
    }

    /* Eingabegruppe */
    .input-group {
        display: flex;
        gap: 8px;
        margin-bottom: 12px;
    }

    .input-group input {
        flex: 1;
        padding: 8px 12px;
        border: 1px solid #8a8886;
        border-radius: 2px;
        font-size: 14px;
        transition: border-color 0.1s;
    }

    .input-group input:focus {
        outline: none;
        border-color: #0078d4;
        box-shadow: 0 0 0 1px #0078d4;
    }

    /* Buttons im Microsoft-Stil */
    .ms-Button {
        padding: 8px 16px;
        border: 1px solid #8a8886;
        border-radius: 2px;
        background: #fff;
        cursor: pointer;
        font-size: 14px;
        transition: all 0.1s;
    }

    .ms-Button:hover:not(:disabled) {
        background: #f3f2f1;
    }

    .ms-Button--primary {
        background: #0078d4;
        border-color: #0078d4;
        color: #fff;
    }

    .ms-Button--primary:hover:not(:disabled) {
        background: #106ebe;
        border-color: #106ebe;
    }

    /* Datei oeffnen / SharePoint Browser */
    .file-section {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-top: 12px;
        padding-top: 12px;
        border-top: 1px solid #edebe9;
        flex-wrap: wrap;
    }

    .divider-text {
        color: #a19f9d;
    }

    /* Favoriten Dropdown */
    .favorites-section {
        margin-top: 8px;
    }

    .favorites-section label {
        margin-bottom: 4px;
    }

    .ms-Dropdown-select {
        width: 100%;
        padding: 6px 8px;
        border: 1px solid #8a8886;
        border-radius: 2px;
        font-size: 13px;
        background: #fff;
    }

    /* Fehleranzeige */
    .error-message {
        padding: 10px 12px;
        margin-top: 12px;
        background-color: #fde7e9;
        border-left: 3px solid #a4262c;
        color: #a4262c;
        border-radius: 2px;
    }

    /* ===== Display-Ansicht: Vollbild-iframe ===== */

    .view-display {
        width: 100%;
        height: 100%;
        position: relative;
    }

    .view-display #vizFrame {
        width: 100%;
        height: 100%;
        border: none;
        display: block;
    }

    /* Schwebendes Toolbar-Overlay */
    .toolbar {
        position: absolute;
        top: 8px;
        right: 8px;
        display: flex;
        gap: 4px;
        opacity: 0;
        transition: opacity 0.3s ease;
        z-index: 100;
    }

    .view-display:hover .toolbar {
        opacity: 1;
    }

    .toolbar-btn {
        width: 32px;
        height: 32px;
        border: none;
        border-radius: 4px;
        background: rgba(255, 255, 255, 0.9);
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.2);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
        color: #323130;
        padding: 0;
    }

    .toolbar-btn:hover {
        background: #ffffff;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.25);
    }

    /* Praesentationsmodus: Toolbar und Setup komplett ausblenden */
    body.presentation-mode .toolbar {
        display: none !important;
    }

    body.presentation-mode .view-setup {
        display: none !important;
    }

    /* Ladeanimation */
    .loading-overlay {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(255, 255, 255, 0.8);
        z-index: 50;
    }

    .spinner {
        width: 32px;
        height: 32px;
        border: 3px solid #edebe9;
        border-top-color: #0078d4;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }
    </style>
</head>
<body class="ms-Fabric">
    <!-- Setup-Ansicht: URL-Eingabe (zentrierte Karte) -->
    <div id="setupView" class="view-setup">
        <div class="setup-card">
            <h2 class="ms-font-l">MACS Matchmaker Data Viewer</h2>

            <label class="ms-font-m" for="vizUrl">URL to HTML visualization:</label>
            <div class="input-group">
                <input
                    type="url"
                    id="vizUrl"
                    class="ms-TextField-field"
                    placeholder="https://company.sharepoint.com/.../visualization.html"
                />
                <button id="loadBtn" class="ms-Button ms-Button--primary">
                    <span class="ms-Button-label">Laden</span>
                </button>
            </div>

            <div class="file-section">
                <span class="divider-text ms-font-s">or</span>
                <button id="fileBtn" class="ms-Button">
                    <span class="ms-Button-label">Open local file...</span>
                </button>
                <button id="spPickerBtn" class="ms-Button">
                    <span class="ms-Button-label">Browse SharePoint...</span>
                </button>
                <input type="file" id="fileInput" accept=".html,.htm" style="display: none;">
            </div>

            <div class="favorites-section">
                <label class="ms-font-s">Recent:</label>
                <select id="favorites" class="ms-Dropdown-select">
                    <option value="">-- Select --</option>
                </select>
            </div>

            <div id="errorMsg" class="error-message ms-font-s" style="display: none;"></div>
        </div>
    </div>

    <!-- Display-Ansicht: Vollbild-Visualisierung -->
    <div id="displayView" class="view-display" style="display: none;">
        <iframe
            id="vizFrame"
            sandbox="allow-scripts allow-same-origin allow-popups allow-forms"
        ></iframe>

        <!-- Schwebendes Toolbar-Overlay (oben rechts) -->
        <div id="toolbar" class="toolbar">
            <button id="editBtn" class="toolbar-btn" title="Change URL">
                &#9881;
            </button>
            <button id="refreshBtn" class="toolbar-btn" title="Refresh">
                &#8635;
            </button>
        </div>
    </div>

    <script>
    /*
     * MACS Matchmaker Data Viewer — PowerPoint Content Add-in
     * Bettet interaktive HTML-Visualisierungen direkt auf der Folie ein.
     * SharePoint-Dateien werden via Graph API geladen (NAA-Authentifizierung).
     */

    // Konstanten
    const STORAGE_KEY = 'vizAddin_favorites';
    const SETTINGS_KEY = 'vizUrl';
    const LAST_URL_KEY = 'vizAddin_lastUrl';
    const CONTENT_KEY = 'vizContent';
    const MAX_FAVORITES = 10;
    const MAX_SETTINGS_SIZE = 1900000;

    // MSAL / Graph API
    const CLIENT_ID = 'edcce314-4b24-4216-9f5b-b65f829e3aa2';
    const GRAPH_SCOPES = ['https://graph.microsoft.com/Files.Read'];

    // Zustand
    let currentUrl = '';
    let isOfficeEnvironment = false;
    let msalInstance = null;
    let loadedFileContent = null;

    // Office.js Einstiegspunkt — oder Browser-Fallback
    if (typeof Office !== 'undefined') {
        Office.onReady((info) => {
            if (info.host === Office.HostType.PowerPoint) {
                isOfficeEnvironment = true;
                console.log('Content Add-in geladen in PowerPoint');
            } else {
                console.log('Office geladen, aber nicht PowerPoint — Browser-Modus');
            }
            initializeApp();
        });
    } else {
        console.log('Kein Office.js — Browser-Testmodus');
        document.addEventListener('DOMContentLoaded', initializeApp);
    }

    /**
     * App initialisieren
     */
    async function initializeApp() {
        await initializeMsal();

        document.getElementById('loadBtn').addEventListener('click', () => {
            handleLoadClick(document.getElementById('vizUrl').value);
        });

        document.getElementById('vizUrl').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                handleLoadClick(document.getElementById('vizUrl').value);
            }
        });

        document.getElementById('favorites').addEventListener('change', (e) => {
            if (e.target.value) {
                document.getElementById('vizUrl').value = e.target.value;
                handleLoadClick(e.target.value);
            }
        });

        document.getElementById('fileBtn').addEventListener('click', () => {
            document.getElementById('fileInput').click();
        });
        document.getElementById('fileInput').addEventListener('change', handleFileSelect);
        document.getElementById('spPickerBtn').addEventListener('click', launchSharePointPicker);

        document.getElementById('editBtn').addEventListener('click', showSetupView);
        document.getElementById('refreshBtn').addEventListener('click', () => {
            if (loadedFileContent) {
                const vizFrame = document.getElementById('vizFrame');
                vizFrame.removeAttribute('src');
                vizFrame.srcdoc = loadedFileContent;
            } else if (currentUrl) {
                loadVisualization(currentUrl);
            }
        });

        document.getElementById('vizFrame').addEventListener('load', onFrameLoaded);
        document.getElementById('vizFrame').addEventListener('error', onFrameError);

        loadFavorites();
        restoreSavedUrl();

        if (isOfficeEnvironment) {
            detectViewMode();
        }
    }

    // ===== MSAL / Graph API =====

    async function initializeMsal() {
        if (typeof msal === 'undefined') {
            console.warn('MSAL.js nicht geladen — SharePoint-Zugriff nicht verfuegbar');
            return;
        }

        const msalConfig = {
            auth: {
                clientId: CLIENT_ID,
                authority: 'https://login.microsoftonline.com/common',
                supportsNestedAppAuth: true
            }
        };

        try {
            msalInstance = await msal.createNestablePublicClientApplication(msalConfig);
            console.log('MSAL initialisiert (NAA-Modus)');
        } catch (naaError) {
            console.log('NAA nicht verfuegbar — SharePoint-Features nur in PowerPoint aktiv');
        }
    }

    async function getGraphToken() {
        if (!msalInstance) {
            throw new Error('Authentication not available. Please reload the add-in.');
        }

        const tokenRequest = { scopes: GRAPH_SCOPES };

        const accounts = msalInstance.getAllAccounts();
        if (accounts.length > 0) {
            tokenRequest.account = accounts[0];
        }

        try {
            const response = await msalInstance.acquireTokenSilent(tokenRequest);
            return response.accessToken;
        } catch (silentError) {
            console.log('Silent token failed, trying popup:', silentError.message);
            try {
                const response = await msalInstance.acquireTokenPopup(tokenRequest);
                return response.accessToken;
            } catch (popupError) {
                throw new Error('Sign-in failed: ' + popupError.message);
            }
        }
    }

    async function fetchSharePointContent(url) {
        const token = await getGraphToken();

        const base64 = btoa(url)
            .replace(/\+/g, '-')
            .replace(/\//g, '_')
            .replace(/=+$/, '');
        const shareId = 'u!' + base64;

        const response = await fetch(
            'https://graph.microsoft.com/v1.0/shares/' + shareId + '/driveItem/content',
            { headers: { 'Authorization': 'Bearer ' + token } }
        );

        if (!response.ok) {
            if (response.status === 401 || response.status === 403) {
                throw new Error('No permission for this file. Please check access rights.');
            }
            throw new Error('Could not load file (HTTP ' + response.status + ')');
        }

        return await response.text();
    }

    // ===== SharePoint File Picker (v8) =====

    function getSharePointBaseUrl() {
        if (isOfficeEnvironment) {
            try {
                const docUrl = Office.context.document.url;
                if (docUrl && docUrl.includes('.sharepoint.com')) {
                    return new URL(docUrl).origin;
                }
            } catch (e) {}
        }
        const cached = localStorage.getItem('vizAddin_spBaseUrl');
        if (cached) return cached;
        const baseUrl = prompt('SharePoint URL (e.g. https://company.sharepoint.com):');
        if (baseUrl) {
            const cleaned = baseUrl.replace(/\/+$/, '');
            localStorage.setItem('vizAddin_spBaseUrl', cleaned);
            return cleaned;
        }
        return null;
    }

    async function launchSharePointPicker() {
        if (!msalInstance) {
            showError('SharePoint browser requires authentication. MSAL not available.');
            return;
        }
        const baseUrl = getSharePointBaseUrl();
        if (!baseUrl) return;

        const channelId = crypto.randomUUID();
        const pickerOptions = {
            sdk: "8.0",
            entry: { oneDrive: { files: {} } },
            authentication: {},
            messaging: { origin: window.location.origin, channelId: channelId },
            typesAndSources: {
                mode: "files",
                filters: [".html", ".htm"],
                pivots: { oneDrive: true, recent: true, sharedLibraries: true }
            },
            selection: { mode: "single" }
        };

        const win = window.open("", "SharePointPicker", "width=1080,height=680");
        if (!win) {
            showError('Popup blocked. Please allow popups for this add-in.');
            return;
        }

        try {
            const authToken = await getPickerToken({ resource: baseUrl, type: "SharePoint" });
            const queryString = new URLSearchParams({
                filePicker: JSON.stringify(pickerOptions)
            });
            const pickerUrl = baseUrl + "/_layouts/15/FilePicker.aspx?" + queryString;

            const form = win.document.createElement("form");
            form.setAttribute("action", pickerUrl);
            form.setAttribute("method", "POST");
            win.document.body.append(form);

            const input = win.document.createElement("input");
            input.setAttribute("type", "hidden");
            input.setAttribute("name", "access_token");
            input.setAttribute("value", authToken);
            form.appendChild(input);
            form.submit();
        } catch (error) {
            win.close();
            showError('SharePoint authentication failed: ' + error.message);
            return;
        }

        window.addEventListener("message", function onMessage(event) {
            if (event.source !== win) return;
            const message = event.data;
            if (message.type === "initialize" && message.channelId === channelId) {
                window.removeEventListener("message", onMessage);
                const port = event.ports[0];
                port.addEventListener("message", function(msg) {
                    handlePickerCommand(msg, port, win);
                });
                port.start();
                port.postMessage({ type: "activate" });
            }
        });
    }

    async function handlePickerCommand(message, port, win) {
        const payload = message.data;
        if (payload.type !== "command") return;

        port.postMessage({ type: "acknowledge", id: payload.id });
        const command = payload.data;

        switch (command.command) {
            case "authenticate":
                try {
                    const token = await getPickerToken(command);
                    port.postMessage({ type: "result", id: payload.id,
                        data: { result: "token", token: token } });
                } catch (e) {
                    port.postMessage({ type: "result", id: payload.id,
                        data: { result: "error", error: { code: "authError", message: e.message } } });
                }
                break;
            case "close":
                win.close();
                break;
            case "pick":
                if (command.items && command.items.length > 0) {
                    const item = command.items[0];
                    const fileUrl = item.webUrl || item.webDavUrl;
                    if (fileUrl) {
                        document.getElementById('vizUrl').value = fileUrl;
                        handleLoadClick(fileUrl);
                    }
                }
                port.postMessage({ type: "result", id: payload.id,
                    data: { result: "success" } });
                win.close();
                break;
            default:
                port.postMessage({ type: "result", id: payload.id,
                    data: { result: "error", error: { code: "unsupportedCommand", message: command.command } } });
                break;
        }
    }

    async function getPickerToken(command) {
        if (!msalInstance) throw new Error('MSAL not available');
        let scopes;
        switch (command.type) {
            case "SharePoint":
            case "SharePoint_SelfIssued":
                scopes = [command.resource + "/.default"];
                break;
            case "Graph":
                scopes = ["https://graph.microsoft.com/.default"];
                break;
            default:
                scopes = [command.resource + "/.default"];
        }
        const accounts = msalInstance.getAllAccounts();
        const tokenRequest = { scopes: scopes };
        if (accounts.length > 0) tokenRequest.account = accounts[0];
        try {
            const resp = await msalInstance.acquireTokenSilent(tokenRequest);
            return resp.accessToken;
        } catch (e) {
            const resp = await msalInstance.acquireTokenPopup(tokenRequest);
            return resp.accessToken;
        }
    }

    // ===== Lokale Datei oeffnen =====

    function handleFileSelect(event) {
        const file = event.target.files[0];
        if (!file) return;

        if (!file.name.endsWith('.html') && !file.name.endsWith('.htm')) {
            showError('Please select an HTML file (.html or .htm)');
            return;
        }

        hideError();

        const reader = new FileReader();
        reader.onload = function(e) {
            loadedFileContent = e.target.result;
            currentUrl = 'file://' + file.name;

            if (isOfficeEnvironment) {
                Office.context.document.settings.set(SETTINGS_KEY, currentUrl);

                if (loadedFileContent.length <= MAX_SETTINGS_SIZE) {
                    Office.context.document.settings.set(CONTENT_KEY, loadedFileContent);
                    console.log('Dateiinhalt gespeichert in Document Settings (' +
                        Math.round(loadedFileContent.length / 1024) + ' KB)');
                } else {
                    Office.context.document.settings.remove(CONTENT_KEY);
                    console.warn('Datei zu gross fuer Document Settings (' +
                        Math.round(loadedFileContent.length / 1024) + ' KB)');
                    showError('File saved but too large to persist in presentation (' +
                        Math.round(loadedFileContent.length / 1024) + ' KB). ' +
                        'You will need to re-select it next time.');
                }

                Office.context.document.settings.saveAsync();
            }

            const vizFrame = document.getElementById('vizFrame');
            vizFrame.removeAttribute('src');
            vizFrame.srcdoc = loadedFileContent;
            hideLoading();
            showDisplayView();
            console.log('Lokale Datei geladen:', file.name);
        };
        reader.onerror = function() {
            showError('Could not read file.');
        };
        reader.readAsText(file);

        event.target.value = '';
    }

    // ===== URL laden und speichern =====

    function handleLoadClick(url) {
        if (!url) {
            showError('Please enter a URL.');
            return;
        }
        if (!isValidUrl(url)) {
            showError('Please enter a valid URL (https://...)');
            return;
        }
        hideError();
        currentUrl = url;

        if (isOfficeEnvironment) {
            Office.context.document.settings.set(SETTINGS_KEY, url);
            Office.context.document.settings.saveAsync((result) => {
                if (result.status === Office.AsyncResultStatus.Failed) {
                    console.error('Settings speichern fehlgeschlagen:', result.error.message);
                }
            });
        }

        try {
            localStorage.setItem(LAST_URL_KEY, url);
        } catch (e) {
            console.warn('localStorage Backup fehlgeschlagen:', e);
        }

        addToFavorites(url);
        loadVisualization(url);
    }

    async function loadVisualization(url) {
        const vizFrame = document.getElementById('vizFrame');
        loadedFileContent = null;

        if (isOfficeEnvironment) {
            Office.context.document.settings.remove(CONTENT_KEY);
        }

        if (isSharePointUrl(url)) {
            if (!msalInstance) {
                showError('SharePoint URLs require authentication. MSAL could not be loaded.');
                showSetupView();
                return;
            }

            showLoading();
            try {
                const htmlContent = await fetchSharePointContent(url);
                vizFrame.removeAttribute('src');
                vizFrame.srcdoc = htmlContent;
                hideLoading();
                showDisplayView();
                console.log('SharePoint-Visualisierung geladen via Graph API:', url);
            } catch (error) {
                hideLoading();
                showError(error.message);
                showSetupView();
            }
        } else {
            vizFrame.removeAttribute('srcdoc');
            vizFrame.src = url;
        }
    }

    // ===== Ansichten umschalten =====

    function showSetupView() {
        document.getElementById('setupView').style.display = 'flex';
        document.getElementById('displayView').style.display = 'none';

        if (currentUrl) {
            document.getElementById('vizUrl').value = currentUrl;
        }
    }

    function showDisplayView() {
        document.getElementById('setupView').style.display = 'none';
        document.getElementById('displayView').style.display = 'block';
    }

    // ===== Lade-Anzeige =====

    function showLoading() {
        let overlay = document.getElementById('loadingOverlay');
        if (!overlay) {
            overlay = document.createElement('div');
            overlay.id = 'loadingOverlay';
            overlay.className = 'loading-overlay';
            overlay.innerHTML = '<div class="spinner"></div>';
            document.getElementById('displayView').appendChild(overlay);
        }
        overlay.style.display = 'flex';
        showDisplayView();
    }

    function hideLoading() {
        const overlay = document.getElementById('loadingOverlay');
        if (overlay) overlay.style.display = 'none';
    }

    // ===== Frame-Events =====

    function onFrameLoaded() {
        hideLoading();
        showDisplayView();
        console.log('Visualisierung geladen:', currentUrl);
    }

    function onFrameError() {
        hideLoading();
        showError('Could not load visualization. Please check the URL and access permissions.');
        showSetupView();
    }

    // ===== URL wiederherstellen =====

    function restoreSavedUrl() {
        let savedUrl = null;

        if (isOfficeEnvironment) {
            try {
                savedUrl = Office.context.document.settings.get(SETTINGS_KEY);
            } catch (e) {
                console.warn('Document Settings nicht verfuegbar:', e);
            }
        }

        if (!savedUrl) {
            try {
                savedUrl = localStorage.getItem(LAST_URL_KEY);
            } catch (e) {
                console.warn('localStorage nicht verfuegbar:', e);
            }
        }

        if (!savedUrl) {
            const favorites = getFavorites();
            if (favorites.length > 0) {
                savedUrl = favorites[0].url;
            }
        }

        if (savedUrl) {
            currentUrl = savedUrl;

            if (savedUrl.startsWith('file://') && isOfficeEnvironment) {
                try {
                    const savedContent = Office.context.document.settings.get(CONTENT_KEY);
                    if (savedContent) {
                        loadedFileContent = savedContent;
                        const vizFrame = document.getElementById('vizFrame');
                        vizFrame.removeAttribute('src');
                        vizFrame.srcdoc = savedContent;
                        showDisplayView();
                        console.log('Gespeicherten Dateiinhalt wiederhergestellt:', savedUrl);
                        return;
                    }
                } catch (e) {
                    console.warn('Gespeicherter Dateiinhalt nicht verfuegbar:', e);
                }
                return;
            }

            loadVisualization(savedUrl);
        }
    }

    // ===== Praesentationsmodus =====

    function detectViewMode() {
        if (!isOfficeEnvironment) return;

        Office.context.document.addHandlerAsync(
            Office.EventType.ActiveViewChanged,
            onViewChanged,
            (result) => {
                if (result.status === Office.AsyncResultStatus.Failed) {
                    console.warn('ActiveViewChanged Handler fehlgeschlagen:', result.error.message);
                }
            }
        );

        Office.context.document.getActiveViewAsync((result) => {
            if (result.status === Office.AsyncResultStatus.Succeeded) {
                handleViewMode(result.value);
            }
        });
    }

    function onViewChanged(args) {
        handleViewMode(args.activeView);
    }

    function handleViewMode(activeView) {
        if (activeView === Office.ActiveView.Read) {
            document.body.classList.add('presentation-mode');

            if (!currentUrl) {
                restoreSavedUrl();
            }

            if (currentUrl) {
                showDisplayView();
            } else {
                document.getElementById('setupView').style.display = 'none';
            }
        } else {
            document.body.classList.remove('presentation-mode');
        }
    }

    // ===== Favoriten (localStorage, geteilt) =====

    function addToFavorites(url) {
        if (!url) return;

        let favorites = getFavorites();
        favorites = favorites.filter(fav => fav.url !== url);
        favorites.unshift({
            url: url,
            name: extractFileName(url),
            added: new Date().toISOString()
        });

        if (favorites.length > MAX_FAVORITES) {
            favorites = favorites.slice(0, MAX_FAVORITES);
        }

        localStorage.setItem(STORAGE_KEY, JSON.stringify(favorites));
        loadFavorites();
    }

    function getFavorites() {
        try {
            const stored = localStorage.getItem(STORAGE_KEY);
            return stored ? JSON.parse(stored) : [];
        } catch (e) {
            console.error('Fehler beim Laden der Favoriten:', e);
            return [];
        }
    }

    function loadFavorites() {
        const favoritesSelect = document.getElementById('favorites');
        const favorites = getFavorites();

        favoritesSelect.innerHTML = '<option value="">-- Select --</option>';

        favorites.forEach(fav => {
            const option = document.createElement('option');
            option.value = fav.url;
            option.textContent = fav.name || fav.url;
            favoritesSelect.appendChild(option);
        });
    }

    // ===== Hilfsfunktionen =====

    function isValidUrl(string) {
        try {
            const url = new URL(string);
            return url.protocol === 'https:' ||
                   (url.protocol === 'http:' && url.hostname === 'localhost');
        } catch (_) {
            return false;
        }
    }

    function isSharePointUrl(url) {
        return url.includes('.sharepoint.com') || url.includes('.sharepoint-df.com');
    }

    function extractFileName(url) {
        try {
            const pathname = new URL(url).pathname;
            const filename = pathname.split('/').pop();
            return decodeURIComponent(filename) || url;
        } catch (e) {
            return url;
        }
    }

    function showError(message) {
        const errorDiv = document.getElementById('errorMsg');
        errorDiv.textContent = message;
        errorDiv.style.display = 'block';
    }

    function hideError() {
        document.getElementById('errorMsg').style.display = 'none';
    }

    // ===== postMessage-Bruecke =====

    function sendMessageToVisualization(message) {
        const vizFrame = document.getElementById('vizFrame');
        if (vizFrame && vizFrame.contentWindow) {
            vizFrame.contentWindow.postMessage(message, '*');
        }
    }

    window.addEventListener('message', (event) => {
        if (event.origin === window.location.origin ||
            event.origin.includes('.sharepoint.com') ||
            event.origin.includes('localhost') ||
            event.origin.includes('github.io')) {
            console.log('Nachricht von Visualisierung:', event.data);
        }
    });
    </script>
</body>
</html>
